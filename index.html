<!DOCTYPE html>
<html>
<head>

<title>Sartaaj Library</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#f1f5f9;
}

.box{
max-width:450px;
margin:30px auto;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 3px 10px #ccc;
}

h1{
text-align:center;
color:#0d47a1;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:14px;
background:#1565c0;
color:white;
border:none;
border-radius:8px;
font-size:18px;
}

#result{
text-align:center;
margin-top:15px;
font-weight:bold;
}

</style>

</head>


<body>


<div class="box">

<div class="card">

<h1>📚 Sartaaj Library</h1>

<p style="text-align:center">
Online Seat Booking
</p>


<input id="name" type="text" placeholder="Student Name">


<input id="mobile" type="number" placeholder="Mobile Number">


<select id="seat">

<option value="">Select Seat</option>
<option>Seat 1</option>
<option>Seat 2</option>
<option>Seat 3</option>
<option>Seat 4</option>
<option>Seat 5</option>
<option>Seat 6</option>
<option>Seat 7</option>
<option>Seat 8</option>
<option>Seat 9</option>
<option>Seat 10</option>
<option>Seat 11</option>
<option>Seat 12</option>
<option>Seat 13</option>
<option>Seat 14</option>
<option>Seat 15</option>
<option>Seat 16</option>

</select>


<button type="button" onclick="bookNow()">
Book Now
</button>


<div id="result"></div>


</div>

</div>



<script>

function bookNow(){

var name=document.getElementById("name").value;
var mobile=document.getElementById("mobile").value;
var seat=document.getElementById("seat").value;


if(name=="" || mobile=="" || seat==""){

document.getElementById("result").innerHTML=
"⚠️ Please fill all details";

return;

}


document.getElementById("result").innerHTML=
"✅ Booking Successful";


alert(
"Seat Booking Details\n\n"+
"Name: "+name+
"\nMobile: "+mobile+
"\nSeat: "+seat
);


}

</script>


</body>
</html>
