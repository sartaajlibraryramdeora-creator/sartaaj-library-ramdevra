<!DOCTYPE html>
<html>

<head>
  <base target="_top">

  <style>
    body{
      margin:0;
      padding:0;
      font-family:Arial, sans-serif;
      background:#f2f5f9;
    }

    .container{
      width:90%;
      max-width:500px;
      margin:30px auto;
    }

    .card{
      background:white;
      padding:25px;
      border-radius:15px;
      box-shadow:0 4px 15px rgba(0,0,0,0.1);
    }

    h1{
      text-align:center;
      color:#1a237e;
    }

    .sub{
      text-align:center;
      color:#666;
    }

    label{
      display:block;
      margin-top:15px;
      font-weight:bold;
    }

    input,select{
      width:100%;
      padding:12px;
      margin-top:5px;
      border:1px solid #ccc;
      border-radius:8px;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:13px;
      margin-top:20px;
      background:#1a73e8;
      color:white;
      border:none;
      border-radius:8px;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:#0d47a1;
    }

    #msg{
      margin-top:15px;
      text-align:center;
      font-weight:bold;
    }

  </style>

</head>

<body>

<div class="container">

<div class="card">

<h1>📚 Sartaaj Library</h1>

<p class="sub">Seat Booking System</p>


<label>Student Name</label>
<input type="text" id="name" placeholder="अपना नाम लिखें">


<label>Mobile Number</label>
<input type="number" id="mobile" placeholder="मोबाइल नंबर लिखें">


<label>Select Seat</label>
<select id="seat">
<option value="">Seat चुनें</option>
<option>Seat 1</option>
<option>Seat 2</option>
<option>Seat 3</option>
<option>Seat 4</option>
<option>Seat 5</option>
<option>Seat 6</option>
<option>Seat 7</option>
<option>Seat 8</option>
</select>


<button onclick="bookSeat()">Book Seat</button>


<div id="msg"></div>


</div>

</div>
