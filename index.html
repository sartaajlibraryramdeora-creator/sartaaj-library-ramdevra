<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sartaaj Library - सीट बुकिंग</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans Devanagari', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        header {
            background: #1e3a8a;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }
        .nav button {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        .nav button.active {
            background: #1e3a8a;
            color: white;
        }
        .content {
            padding: 30px;
        }
        .seats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 15px;
            margin: 30px 0;
        }
        .seat {
            height: 80px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            border: 3px solid #e2e8f0;
        }
        .seat.available {
            background: #22c55e;
            color: white;
        }
        .seat.booked {
            background: #ef4444;
            color: white;
            cursor: not-allowed;
        }
        .seat.selected {
            background: #eab308;
            transform: scale(1.1);
        }
        form {
            max-width: 500px;
            margin: 0 auto;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 15px;
        }
        .status {
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }
        .admin-table th, .admin-table td {
            padding: 12px;
            border: 1px solid #e2e8f0;
            text-align: left;
        }
        .admin-table th {
            background: #1e3a8a;
            color: white;
        }
        @media (max-width: 768px) {
            .seats-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>सरताज लाइब्रेरी</h1>
            <p>सीट बुकिंग सिस्टम</p>
        </header>
        
        <div class="nav">
            <button onclick="showTab(0)" class="active">छात्र पोर्टल</button>
            <button onclick="showTab(1)">एडमिन पोर्टल</button>
        </div>

        <!-- Student Side -->
        <div id="student-tab" class="content">
            <h2 style="text-align:center; margin-bottom:20px;">सीट बुक करें</h2>
            
            <form id="booking-form">
                <input type="text" id="student-name" placeholder="आपका पूरा नाम" required>
                <input type="tel" id="student-mobile" placeholder="मोबाइल नंबर" required pattern="[0-9]{10}">
                
                <div id="seats-container">
                    <h3 style="margin:20px 0 10px;">उपलब्ध सीटें चुनें (16 सीटें)</h3>
                    <div class="seats-grid" id="seats-grid"></div>
                </div>
                
                <div id="payment-section" style="display:none;">
                    <div class="status" id="payment-status"></div>
                    <div id="card-element"></div>
                    <button type="button" onclick="processPayment()">पेमेंट करें और बुक करें</button>
                </div>
                
                <button type="button" id="book-btn" onclick="selectSeatAndPay()">सीट चुनें और पेमेंट आगे बढ़ाएं</button>
            </form>
            
            <div id="booking-success" style="display:none; text-align:center; padding:20px; background:#ecfdf5; border-radius:10px; margin-top:20px;">
                <h3>✅ बुकिंग सफल!</h3>
                <p id="success-details"></p>
            </div>
        </div>

        <!-- Admin Side -->
        <div id="admin-tab" class="content" style="display:none;">
            <h2 style="text-align:center; margin-bottom:20px;">एडमिन डैशबोर्ड</h2>
            <input type="password" id="admin-pass" placeholder="एडमिन पासवर्ड" style="max-width:300px; margin:0 auto 20px; display:block;">
            <button onclick="loginAdmin()" style="max-width:300px; margin:0 auto 20px; display:block;">लॉगिन</button>
            
            <div id="admin-content" style="display:none;">
                <button onclick="loadBookings()" style="margin-bottom:15px;">रिफ्रेश बुकिंग्स</button>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>सीट नंबर</th>
                            <th>नाम</th>
                            <th>मोबाइल</th>
                            <th>बुकिंग तारीख</th>
                            <th>एक्सपायरी</th>
                            <th>एक्शन</th>
                        </tr>
                    </thead>
                    <tbody id="bookings-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // === CONFIGURATION - USER TO REPLACE ===
        const firebaseConfig = {
            apiKey: "YOUR_FIREBASE_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const seatsRef = db.ref('library_seats');
        const bookingsRef = db.ref('bookings');
        
        // Stripe
        let stripe;
        let cardElement;
        let selectedSeat = null;
        
        // Initialize Stripe (replace with your publishable key)
        function initStripe() {
            stripe = Stripe('pk_test_YOUR_STRIPE_PUBLISHABLE_KEY'); // Replace with real key in production
            const elements = stripe.elements();
            cardElement = elements.create('card', {
                style: {
                    base: { fontSize: '16px', color: '#424770' }
                }
            });
            cardElement.mount('#card-element');
        }
        
        // Render Seats
        function renderSeats(bookedSeats) {
            const grid = document.getElementById('seats-grid');
            grid.innerHTML = '';
            
            for (let i = 1; i <= 16; i++) {
                const seatDiv = document.createElement('div');
                seatDiv.className = `seat ${bookedSeats[i] ? 'booked' : 'available'}`;
                seatDiv.textContent = i;
                seatDiv.dataset.seat = i;
                
                if (!bookedSeats[i]) {
                    seatDiv.onclick = () => selectSeat(i, seatDiv);
                }
                
                grid.appendChild(seatDiv);
            }
        }
        
        // Load available seats
        function loadSeats() {
            seatsRef.once('value', (snapshot) => {
                const data = snapshot.val() || {};
                renderSeats(data);
            });
            
            // Listen for real-time changes
            seatsRef.on('value', (snapshot) => {
                const data = snapshot.val() || {};
                renderSeats(data);
            });
        }
        
        function selectSeat(seatNum, element) {
            document.querySelectorAll('.seat').forEach(s => s.classList.remove('selected'));
            element.classList.add('selected');
            selectedSeat = seatNum;
            document.getElementById('payment-section').style.display = 'block';
        }
        
        function selectSeatAndPay() {
            if (!selectedSeat) {
                alert('कृपया एक सीट चुनें');
                return;
            }
            // Proceed to payment UI
        }
        
        async function processPayment() {
            const name = document.getElementById('student-name').value.trim();
            const mobile = document.getElementById('student-mobile').value.trim();
            
            if (!name || !mobile || mobile.length !== 10) {
                alert('नाम और 10 अंकों का मोबाइल नंबर भरें');
                return;
            }
            
            if (!selectedSeat) return;
            
            const paymentStatus = document.getElementById('payment-status');
            paymentStatus.textContent = 'पेमेंट प्रोसेस हो रहा है...';
            paymentStatus.style.background = '#fef3c7';
            
            try {
                // In production: Call Firebase Cloud Function to create PaymentIntent
                // For demo, simulate successful payment
                // Real implementation needs server-side verification
                
                // Simulate payment success
                setTimeout(async () => {
                    const bookingData = {
                        seat: selectedSeat,
                        name: name,
                        mobile: mobile,
                        bookingDate: new Date().toISOString(),
                        expiryDate: new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString()
                    };
                    
                    // Save booking
                    await bookingsRef.child(selectedSeat).set(bookingData);
                    await seatsRef.child(selectedSeat).set(true); // Mark as booked
                    
                    // Show success
                    document.getElementById('booking-success').style.display = 'block';
                    document.getElementById('success-details').innerHTML = `
                        सीट नंबर <strong>${selectedSeat}</strong> सफलतापूर्वक बुक हो गई।<br>
                        नाम: ${name}<br>
                        मोबाइल: ${mobile}<br>
                        वैलिडिटी: 30 दिन
                    `;
                    
                    // Reset form
                    document.getElementById('payment-section').style.display = 'none';
                    selectedSeat = null;
                    loadSeats();
                }, 1500);
                
            } catch (e) {
                paymentStatus.textContent = 'पेमेंट फेल। दोबारा प्रयास करें।';
                paymentStatus.style.background = '#fee2e2';
            }
        }
        
        // Admin Functions
        let isAdminLoggedIn = false;
        
        function loginAdmin() {
            const pass = document.getElementById('admin-pass').value;
            // Simple demo password - change in production
            if (pass === 'admin123') {
                isAdminLoggedIn = true;
                document.getElementById('admin-content').style.display = 'block';
                loadBookings();
            } else {
                alert('गलत पासवर्ड');
            }
        }
        
        function loadBookings() {
            if (!isAdminLoggedIn) return;
            
            const tbody = document.getElementById('bookings-body');
            tbody.innerHTML = '';
            
            bookingsRef.once('value', (snapshot) => {
                const bookings = snapshot.val() || {};
                
                Object.keys(bookings).forEach(seat => {
                    const b = bookings[seat];
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${seat}</td>
                        <td>${b.name}</td>
                        <td>${b.mobile}</td>
                        <td>${new Date(b.bookingDate).toLocaleDateString('hi-IN')}</td>
                        <td>${new Date(b.expiryDate).toLocaleDateString('hi-IN')}</td>
                        <td>
                            <button onclick="cancelBooking('${seat}')" style="background:#ef4444; color:white; padding:5px 10px; border:none; border-radius:4px; cursor:pointer;">Cancel</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            });
        }
        
        async function cancelBooking(seat) {
            if (confirm(`सीट ${seat} कैंसल करें?`)) {
                await seatsRef.child(seat).remove();
                await bookingsRef.child(seat).remove();
                loadBookings();
                loadSeats();
            }
        }
        
        function showTab(tab) {
            document.getElementById('student-tab').style.display = tab === 0 ? 'block' : 'none';
            document.getElementById('admin-tab').style.display = tab === 1 ? 'block' : 'none';
            
            document.querySelectorAll('.nav button').forEach((btn, i) => {
                btn.classList.toggle('active', i === tab);
            });
            
            if (tab === 0) loadSeats();
        }
        
        // Auto-expiry checker (runs on load)
        function checkExpiredBookings() {
            bookingsRef.once('value', (snapshot) => {
                const now = Date.now();
                const bookings = snapshot.val() || {};
                
                Object.keys(bookings).forEach(async seat => {
                    const b = bookings[seat];
                    if (new Date(b.expiryDate).getTime() < now) {
                        await seatsRef.child(seat).remove();
                        await bookingsRef.child(seat).remove();
                    }
                });
            });
        }
        
        // Initialize everything
        window.onload = () => {
            initStripe();
            loadSeats();
            checkExpiredBookings();
            showTab(0);
            
            // Real-time listener for expiry (basic)
            setInterval(checkExpiredBookings, 600000); // every 10 mins
        };
    </script>
</body>
</html>
