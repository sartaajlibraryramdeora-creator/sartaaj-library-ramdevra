<!DOCTYPE html>
<html>
<head>

<title>Sartaaj Library Seat Booking</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  margin:0;
  padding:0;
  font-family:Arial,sans-serif;
  background:#eef2f7;
}

.container{
  max-width:450px;
  margin:30px auto;
  padding:15px;
}

.card{
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 5px 15px #ccc;
}

h1{
  text-align:center;
  color:#123c8c;
}

p{
  text-align:center;
  color:#555;
}

input,select{
  width:100%;
  padding:12px;
  margin-top:12px;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:14px;
  margin-top:20px;
  background:#1565c0;
  color:white;
  border:0;
  border-radius:8px;
  font-size:18px;
  cursor:pointer;
}

button:hover{
  background:#0d47a1;
}

#msg{
  text-align:center;
  margin-top:15px;
  font-weight:bold;
}

.seats{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:20px;
}

.seat{
  background:#ddd;
  padding:10px;
  text-align:center;
  border-radius:8px;
}

</style>

</head>


<body>


<div class="container">

<div class="card">


<h1>📚 Sartaaj Library</h1>

<p>Online Seat Booking System</p>


<input id="name" type="text" placeholder="Student Name">


<input id="mobile" type="number" placeholder="Mobile Number">


<select id="seat">

<option value="">Select Seat</option>

<option>Seat 1</option>
<option>Seat 2</option>
<option>Seat 3</option>
<option>Seat 4</option>
<option>Seat 5</option>
<option>Seat 6</option>
<option>Seat 7</option>
<option>Seat 8</option>
<option>Seat 9</option>
<option>Seat 10</option>
<option>Seat 11</option>
<option>Seat 12</option>
<option>Seat 13</option>
<option>Seat 14</option>
<option>Seat 15</option>
<option>Seat 16</option>

</select>


<button onclick="bookNow()">
Book Now
</button>


<div id="msg"></div>


</div>

</div>



<script>

function bookNow(){

let name=document.getElementById("name").value;
let mobile=document.getElementById("mobile").value;
let seat=document.getElementById("seat").value;


if(name=="" || mobile=="" || seat==""){

document.getElementById("msg").innerHTML="⚠️ Please fill all details";

return;

}


document.getElementById("msg").innerHTML=
"✅ Seat Booked Successfully";


alert(
"Booking Details\n\n"+
"Name: "+name+
"\nMobile: "+mobile+
"\nSeat: "+seat
);


}


</script>


</body>

</html>
