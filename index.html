<!DOCTYPE html>
<html>
<head>
<title>Sartaaj Library</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f2f2f2;
}

.container{
  max-width:450px;
  margin:30px auto;
  padding:20px;
}

.card{
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 0 10px #ccc;
}

h1{
  text-align:center;
  color:#1a237e;
}

p{
  text-align:center;
}

input,select{
  width:100%;
  padding:12px;
  margin-top:12px;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:14px;
  margin-top:20px;
  background:#1565c0;
  color:white;
  border:none;
  border-radius:8px;
  font-size:18px;
}

button:active{
  background:#0d47a1;
}

#message{
  text-align:center;
  margin-top:15px;
  font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>📚 Sartaaj Library</h1>

<p>Seat Booking System</p>

<input type="text" id="name" placeholder="Student Name">

<input type="number" id="mobile" placeholder="Mobile Number">

<select id="seat">
<option value="">Select Seat</option>
<option>Seat 1</option>
<option>Seat 2</option>
<option>Seat 3</option>
<option>Seat 4</option>
<option>Seat 5</option>
<option>Seat 6</option>
<option>Seat 7</option>
<option>Seat 8</option>
</select>

<button onclick="bookNow()">
Book Now
</button>

<div id="message"></div><script>

function bookNow(){

let name = document.getElementById("name").value;
let mobile = document.getElementById("mobile").value;
let seat = document.getElementById("seat").value;


if(name=="" || mobile=="" || seat==""){
document.getElementById("message").innerHTML="⚠️ Please fill all details";
return;
}


document.getElementById("message").innerHTML=
"✅ Seat booking request received";


alert(
"Booking Successful\n\nName: "+name+
"\nMobile: "+mobile+
"\nSeat: "+seat
);


}


</script>


</div>

</div>


</body>
</html>
