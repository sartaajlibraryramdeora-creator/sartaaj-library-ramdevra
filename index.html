<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sartaaj Library - सीट बुकिंग</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans Devanagari', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        header {
            background: #1e3a8a;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }
        .nav button {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        .nav button.active {
            background: #1e3a8a;
            color: white;
        }
        .content {
            padding: 30px;
        }
        .seats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 15px;
            margin: 30px 0;
        }
        .seat {
            height: 80px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            border: 3px solid #e2e8f0;
            user-select: none;
        }
        .seat.available {
            background: #22c55e;
            color: white;
        }
        .seat.booked {
            background: #ef4444;
            color: white;
            cursor: not-allowed;
            opacity: 0.7;
        }
        .seat.selected {
            background: #eab308 !important;
            transform: scale(1.08);
            box-shadow: 0 0 0 4px rgba(234, 179, 8, 0.3);
        }
        form {
            max-width: 500px;
            margin: 0 auto;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 15px;
        }
        button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
        .status {
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .admin-table th, .admin-table td {
            padding: 12px;
            border: 1px solid #e2e8f0;
            text-align: left;
        }
        .admin-table th {
            background: #1e3a8a;
            color: white;
        }
        @media (max-width: 768px) {
            .seats-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>सरताज लाइब्रेरी</h1>
            <p>सीट बुकिंग सिस्टम</p>
        </header>
        
        <div class="nav">
            <button onclick="showTab(0)" class="active" id="student-btn">छात्र पोर्टल</button>
            <button onclick="showTab(1)" id="admin-btn">एडमिन पोर्टल</button>
        </div>

        <!-- Student Side -->
        <div id="student-tab" class="content">
            <h2 style="text-align:center; margin-bottom:20px;">सीट बुक करें</h2>
            
            <form id="booking-form">
                <input type="text" id="student-name" placeholder="आपका पूरा नाम" required>
                <input type="tel" id="student-mobile" placeholder="मोबाइल नंबर (10 अंक)" required pattern="[0-9]{10}">
                
                <div id="seats-container">
                    <h3 style="margin:25px 0 15px; text-align:center;">उपलब्ध सीटें चुनें</h3>
                    <div class="seats-grid" id="seats-grid"></div>
                </div>
                
                <div id="payment-section" style="display:none; margin-top:25px; padding:20px; background:#f8fafc; border-radius:12px;">
                    <h3 style="margin-bottom:15px;">पेमेंट डिटेल्स</h3>
                    <div class="status" id="payment-status" style="display:none;"></div>
                    <div id="card-element" style="padding:15px; border:2px solid #e2e8f0; border-radius:8px; background:white;"></div>
                    <button type="button" onclick="processPayment()" style="margin-top:20px;">₹500 पेमेंट करके बुक करें</button>
                </div>
                
                <button type="button" id="book-btn" onclick="prepareBooking()">सीट चुनें और आगे बढ़ें</button>
            </form>
            
            <div id="booking-success" style="display:none; text-align:center; padding:30px; background:#ecfdf5; border-radius:12px; margin-top:25px;">
                <h3 style="color:#10b981;">✅ बुकिंग सफल हुई!</h3>
                <p id="success-details" style="margin:15px 0; font-size:17px;"></p>
                <button onclick="resetForm()" style="background:#10b981; max-width:200px;">नई बुकिंग करें</button>
            </div>
        </div>

        <!-- Admin Side -->
        <div id="admin-tab" class="content" style="display:none;">
            <h2 style="text-align:center; margin-bottom:20px;">एडमिन डैशबोर्ड</h2>
            
            <div style="max-width:400px; margin:0 auto;">
                <input type="password" id="admin-pass" placeholder="एडमिन पासवर्ड" style="margin-bottom:15px;">
                <button onclick="loginAdmin()" style="margin-bottom:25px;">लॉगिन करें</button>
            </div>
            
            <div id="admin-content" style="display:none;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h3>सभी बुकिंग्स</h3>
                    <button onclick="loadBookings()">🔄 रिफ्रेश</button>
                </div>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>सीट</th>
                            <th>नाम</th>
                            <th>मोबाइल</th>
                            <th>बुकिंग</th>
                            <th>एक्सपायरी</th>
                            <th>एक्शन</th>
                        </tr>
                    </thead>
                    <tbody id="bookings-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ================== CONFIG ==================
        const firebaseConfig = {
            apiKey: "YOUR_FIREBASE_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const seatsRef = db.ref('library_seats');
        const bookingsRef = db.ref('bookings');
        
        let stripe;
        let cardElement;
        let selectedSeat = null;
        
        // ================== INIT STRIPE ==================
        function initStripe() {
            stripe = Stripe('pk_test_YOUR_STRIPE_PUBLISHABLE_KEY'); // ← अपना key डालें
            const elements = stripe.elements();
            cardElement = elements.create('card', {
                style: {
                    base: {
                        fontSize: '16px',
                        color: '#424770',
                    }
                }
            });
            cardElement.mount('#card-element');
        }
        
        // ================== SEATS ==================
        function renderSeats(bookedSeats = {}) {
            const grid = document.getElementById('seats-grid');
            grid.innerHTML = '';
            
            for (let i = 1; i <= 16; i++) {
                const seatDiv = document.createElement('div');
                seatDiv.className = `seat ${bookedSeats[i] ? 'booked' : 'available'}`;
                seatDiv.textContent = `सीट ${i}`;
                seatDiv.dataset.seat = i;
                
                if (!bookedSeats[i]) {
                    seatDiv.addEventListener('click', () => selectSeat(i, seatDiv));
                }
                
                grid.appendChild(seatDiv);
            }
        }
        
        function selectSeat(seatNum, element) {
            document.querySelectorAll('.seat').forEach(s => s.classList.remove('selected'));
            element.classList.add('selected');
            selectedSeat = seatNum;
            document.getElementById('payment-section').style.display = 'block';
            document.getElementById('book-btn').style.display = 'none';
        }
        
        function prepareBooking() {
            const name = document.getElementById('student-name').value.trim();
            const mobile = document.getElementById('student-mobile').value.trim();
            
            if (!name || !mobile || mobile.length !== 10) {
                alert('कृपया नाम और 10 अंकों का मोबाइल नंबर सही भरें');
                return;
            }
            if (!selectedSeat) {
                alert('कृपया एक सीट चुनें');
                return;
            }
            document.getElementById('payment-section').scrollIntoView({ behavior: 'smooth' });
        }
        
        // ================== PAYMENT ==================
        async function processPayment() {
            const name = document.getElementById('student-name').value.trim();
            const mobile = document.getElementById('student-mobile').value.trim();
            const paymentStatus = document.getElementById('payment-status');
            
            if (!selectedSeat) return;
            
            paymentStatus.style.display = 'block';
            paymentStatus.textContent = 'पेमेंट प्रोसेस हो रहा है...';
            paymentStatus.style.background = '#fef3c7';
            paymentStatus.style.color = '#854d0e';
            
            try {
                await new Promise(resolve => setTimeout(resolve, 1800));
                
                const bookingData = {
                    seat: selectedSeat,
                    name: name,
                    mobile: mobile,
                    bookingDate: new Date().toISOString(),
                    expiryDate: new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString(),
                    amount: 500
                };
                
                await bookingsRef.child(selectedSeat.toString()).set(bookingData);
                await seatsRef.child(selectedSeat.toString()).set(true);
                
                document.getElementById('booking-success').style.display = 'block';
                document.getElementById('student-tab').querySelector('form').style.display = 'none';
                
                document.getElementById('success-details').innerHTML = `
                    <strong>सीट नंबर: ${selectedSeat}</strong><br>
                    नाम: ${name}<br>
                    मोबाइल: ${mobile}<br>
                    वैलिडिटी: 30 दिन
                `;
                
                loadSeats();
                
            } catch (error) {
                console.error(error);
                paymentStatus.textContent = 'एरर: दोबारा ट्राई करें';
                paymentStatus.style.background = '#fee2e2';
                paymentStatus.style.color = '#b91c1c';
            }
        }
        
        function resetForm() {
            location.reload();
        }
        
        // ================== ADMIN ==================
        let isAdmin = false;
        
        function loginAdmin() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === 'admin123') {
                isAdmin = true;
                document.getElementById('admin-content').style.display = 'block';
                loadBookings();
            } else {
                alert('गलत पासवर्ड! (डेमो: admin123)');
            }
        }
        
        function loadBookings() {
            if (!isAdmin) return;
            const tbody = document.getElementById('bookings-body');
            tbody.innerHTML = '';
            
            bookingsRef.once('value', (snapshot) => {
                const data = snapshot.val() || {};
                Object.keys(data).sort((a,b)=>a-b).forEach(seat => {
                    const b = data[seat];
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><strong>${seat}</strong></td>
                        <td>${b.name}</td>
                        <td>${b.mobile}</td>
                        <td>${new Date(b.bookingDate).toLocaleDateString('hi-IN')}</td>
                        <td>${new Date(b.expiryDate).toLocaleDateString('hi-IN')}</td>
                        <td><button onclick="cancelBooking('${seat}')" style="background:#dc2626;color:white;border:none;padding:6px 12px;border-radius:4px;cursor:pointer;">Cancel</button></td>
                    `;
                    tbody.appendChild(row);
                });
            });
        }
        
        async function cancelBooking(seat) {
            if (confirm(`सीट ${seat} कैंसल करें?`)) {
                await seatsRef.child(seat).remove();
                await bookingsRef.child(seat).remove();
                loadBookings();
                loadSeats();
            }
        }
        
        // ================== UTILS ==================
        function showTab(n) {
            document.getElementById('student-tab').style.display = n === 0 ? 'block' : 'none';
            document.getElementById('admin-tab').style.display = n === 1 ? 'block' : 'none';
            
            document.getElementById('student-btn').classList.toggle('active', n===0);
            document.getElementById('admin-btn').classList.toggle('active', n===1);
            
            if (n === 0) loadSeats();
        }
        
        function loadSeats() {
            seatsRef.once('value', (snap) => {
                renderSeats(snap.val() || {});
            });
        }
        
        function checkExpired() {
            const now = Date.now();
            bookingsRef.once('value', (snap) => {
                const bookings = snap.val() || {};
                Object.keys(bookings).forEach(key => {
                    if (new Date(bookings[key].expiryDate) < now) {
                        seatsRef.child(key).remove();
                        bookingsRef.child(key).remove();
                    }
                });
            });
        }
        
        // ================== START ==================
        window.onload = function() {
            initStripe();
            loadSeats();
            checkExpired();
            setInterval(checkExpired, 300000);
        };
    </script>
</body>
</html>
